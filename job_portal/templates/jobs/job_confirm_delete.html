{% extends 'base.html' %}
{% block title %}Delete Job{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:500px">
  <div class="glass-card p-4 text-center">
    <i class="bi bi-trash-fill text-danger fs-1 mb-3"></i>
    <h3 class="fw-700">Delete Job</h3>
    <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ job.title }}</strong>? This cannot be undone.</p>
    <form method="post" class="d-flex gap-3 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger btn-rounded px-4">Yes, Delete</button>
      <a href="{% url 'dashboard:recruiter' %}" class="btn btn-outline-secondary btn-rounded px-4">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}

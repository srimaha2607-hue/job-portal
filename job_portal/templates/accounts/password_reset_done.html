{% extends 'base.html' %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card glass-card text-center">
    <i class="bi bi-envelope-check-fill text-success fs-1 mb-3"></i>
    <h2 class="fw-700">Email Sent!</h2>
    <p class="text-muted">Check your inbox for a password reset link. It expires in 1 hour.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-rounded mt-3">Back to Login</a>
  </div>
</div>
{% endblock %}

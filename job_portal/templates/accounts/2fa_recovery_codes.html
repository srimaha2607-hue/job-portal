{% extends 'base.html' %}
{% block title %}Recovery Codes{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:550px">
  <div class="glass-card p-4 text-center">
    <i class="bi bi-shield-check-fill text-success fs-1 mb-3"></i>
    <h2 class="fw-700">2FA Enabled!</h2>
    <p class="text-muted mb-4">Save these recovery codes in a safe place. Each can be used once if you lose access to your authenticator.</p>
    <div class="bg-dark text-white rounded p-3 mb-4 font-monospace text-start">
      {% for code in codes %}<div>{{ code }}</div>{% endfor %}
    </div>
    <a href="{% url 'accounts:profile' %}" class="btn btn-primary btn-rounded">Done — Go to Profile</a>
  </div>
</div>
{% endblock %}

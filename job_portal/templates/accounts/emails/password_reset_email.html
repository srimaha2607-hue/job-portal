<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:Inter,sans-serif;background:#f8f9fa;padding:40px 0">
  <div style="max-width:500px;margin:0 auto;background:#fff;border-radius:16px;padding:40px;box-shadow:0 4px 24px rgba(0,0,0,.08)">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:32px;font-weight:800;color:#6366f1">JobPortal</div>
    </div>
    <h2 style="margin-bottom:16px">Reset Your Password</h2>
    <p style="color:#6b7280;margin-bottom:24px">Click the button below to reset your password. This link expires in 1 hour.</p>
    <div style="text-align:center;margin-bottom:24px">
      <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}"
         style="background:#6366f1;color:#fff;padding:14px 36px;border-radius:50px;text-decoration:none;font-weight:600;display:inline-block">
        Reset Password
      </a>
    </div>
    <p style="color:#9ca3af;font-size:12px">If you didn't request this, ignore this email.</p>
  </div>
</body>
</html>

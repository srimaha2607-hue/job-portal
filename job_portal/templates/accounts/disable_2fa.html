{% extends 'base.html' %}
{% block title %}Disable 2FA{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card glass-card text-center">
    <i class="bi bi-shield-x text-danger fs-1 mb-3"></i>
    <h2 class="fw-700">Disable 2FA</h2>
    <p class="text-muted mb-4">Enter your current OTP code to confirm disabling two-factor authentication.</p>
    <form method="post">
      {% csrf_token %}
      <input type="text" name="token" class="form-control text-center mb-3 otp-input" placeholder="000000" maxlength="6" autocomplete="off">
      <button type="submit" class="btn btn-danger btn-rounded w-100">Disable 2FA</button>
    </form>
    <a href="{% url 'accounts:profile' %}" class="btn btn-link mt-2">Cancel</a>
  </div>
</div>
{% endblock %}

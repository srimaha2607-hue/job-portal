{% extends 'base.html' %}
{% block title %}Account Locked{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card glass-card text-center">
    <i class="bi bi-shield-exclamation text-danger fs-1 mb-3"></i>
    <h2 class="fw-700">Account Temporarily Locked</h2>
    <p class="text-muted">Too many failed login attempts. Please try again in 1 hour or reset your password.</p>
    <a href="{% url 'accounts:password_reset' %}" class="btn btn-primary btn-rounded mt-3">Reset Password</a>
  </div>
</div>
{% endblock %}

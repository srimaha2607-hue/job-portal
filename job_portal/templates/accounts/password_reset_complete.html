{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card glass-card text-center">
    <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
    <h2 class="fw-700">Password Reset!</h2>
    <p class="text-muted">Your password has been changed. You can now log in.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-rounded mt-3">Log In</a>
  </div>
</div>
{% endblock %}

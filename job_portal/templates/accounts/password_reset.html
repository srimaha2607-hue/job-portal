{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card glass-card text-center">
    <i class="bi bi-key-fill text-primary fs-1 mb-3"></i>
    <h2 class="fw-700">Forgot Password?</h2>
    <p class="text-muted mb-4">Enter your email and we'll send you a reset link.</p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3 text-start">
        <label class="form-label fw-500">Email Address</label>
        {{ form.email }}
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-rounded btn-lg">Send Reset Link</button>
    </form>
    <a href="{% url 'accounts:login' %}" class="btn btn-link mt-2">Back to Login</a>
  </div>
</div>
{% endblock %}
